<!-- Console Log Suppression (must run before all other scripts) -->
<script>
(function() {
  var ADMIN_EMAILS = ['rich@prestonlending.com'];
  var isDevEnv = (
    window.location.hostname === 'localhost' ||
    window.location.hostname === '127.0.0.1' ||
    window.location.hostname.includes('webflow.io')
  );
  if (isDevEnv) return;
  function getEmailFromJWT() {
    try {
      var token = localStorage.getItem('Outseta.nocode.accessToken');
      if (!token) return null;
      var payload = JSON.parse(atob(token.split('.')[1]));
      return (payload.email || payload['https://app.outseta.com/claims/email'] || '').toLowerCase();
    } catch (e) { return null; }
  }
  var email = getEmailFromJWT();
  var isAdmin = email && ADMIN_EMAILS.map(function(e){return e.toLowerCase();}).indexOf(email) !== -1;
  if (!isAdmin) {
    console.log = function() {};
    console.info = function() {};
    console.debug = function() {};
  }
})();
</script>

<!-- Outseta Authentication (Staging-Aware + Redirect Support) -->
<script>
var __mtgIsStaging = window.location.hostname.indexOf('webflow.io') !== -1;
var o_options = {
    domain: 'mtgbroker.outseta.com',
    load: 'auth,customForm,emailList,leadCapture,nocode,profile,support',
    tokenStorage: 'local'
};
var __mtgRedirect = new URLSearchParams(window.location.search).get('redirect');
if (__mtgIsStaging) {
  o_options.auth = { authenticationCallbackUrl: window.location.origin + '/app/dashboard' };
} else if (__mtgRedirect && __mtgRedirect.indexOf('/') === 0) {
  o_options.auth = { authenticationCallbackUrl: window.location.origin + __mtgRedirect };
}
</script>
<script src="https://cdn.outseta.com/outseta.min.js" data-options="o_options"></script>

<!-- Staging indicator badge -->
<script>
if (window.__mtgIsStaging) {
  document.addEventListener('DOMContentLoaded', function() {
    var badge = document.createElement('div');
    badge.textContent = 'STAGING';
    badge.style.cssText = 'position:fixed;bottom:12px;right:12px;z-index:999999;background:#e74c3c;color:#fff;padding:6px 14px;border-radius:6px;font-family:system-ui,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;opacity:0.92;pointer-events:none;';
    document.body.appendChild(badge);
  });
}
</script>
