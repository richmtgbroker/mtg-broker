<!-- ================================================
     CONSOLE LOG SUPPRESSION (SECURITY)
     Must run FIRST — before any other scripts output logs.
     Hides all console.log/info/debug from non-admin users on the live site.
     Admins (by email) still see full logs for debugging.
     Logs always visible on *.webflow.io preview and localhost.
     ================================================ -->
<script>
(function() {

  // ── Admin emails that can see console logs ─────────────────────────────
  // Add or remove emails here as needed
  var ADMIN_EMAILS = [
    'rich@prestonlending.com'
  ];

  // Always allow logs on Webflow preview and local dev environments
  var isDevEnv = (
    window.location.hostname === 'localhost' ||
    window.location.hostname === '127.0.0.1' ||
    window.location.hostname.includes('webflow.io')
  );

  if (isDevEnv) return; // Full logs in dev — nothing suppressed

  // Read the logged-in user's email from the Outseta JWT in localStorage
  // (same method used everywhere else on the platform — no extra API call needed)
  function getEmailFromJWT() {
    try {
      var token = localStorage.getItem('Outseta.nocode.accessToken');
      if (!token) return null;
      var payload = JSON.parse(atob(token.split('.')[1]));
      return (
        payload.email ||
        payload['https://app.outseta.com/claims/email'] ||
        ''
      ).toLowerCase();
    } catch (e) {
      return null;
    }
  }

  var email = getEmailFromJWT();
  var adminList = ADMIN_EMAILS.map(function(e) { return e.toLowerCase(); });
  var isAdmin = email && adminList.indexOf(email) !== -1;

  // Suppress logs for everyone who is NOT an admin
  if (!isAdmin) {
    console.log   = function() {};
    console.info  = function() {};
    console.debug = function() {};
    // console.warn and console.error remain active so real errors are still visible
  }

})();
</script>

<!-- Outseta Authentication (Staging-Aware + Redirect Support)
     On production (www.mtg.broker): checks for ?redirect= param and uses
     it as the post-login callback URL. Falls back to default dashboard.
     On staging (*.webflow.io): overrides the post-login redirect
     to the full staging URL so you stay on the staging domain after login.
     NOTE: Outseta requires an absolute URL (not relative) because its SDK
     uses new URL() internally, which fails on relative paths. -->
<script>
var __mtgIsStaging = window.location.hostname.indexOf('webflow.io') !== -1;

var o_options = {
    domain: 'mtgbroker.outseta.com',
    load: 'auth,customForm,emailList,leadCapture,nocode,profile,support',
    tokenStorage: 'local'
};

/* Check if a ?redirect= parameter exists in the URL.
   Used by the AI Loan Finder (/app/ai-search) to redirect back after login
   instead of going to the default dashboard. */
var __mtgRedirect = new URLSearchParams(window.location.search).get('redirect');

if (__mtgIsStaging) {
  /* On staging, build the full absolute URL so Outseta's new URL() doesn't fail */
  o_options.auth = {
    authenticationCallbackUrl: window.location.origin + '/app/dashboard'
  };
} else if (__mtgRedirect && __mtgRedirect.indexOf('/') === 0) {
  /* On production, if ?redirect= param exists and is a relative path (starts with /),
     use it as the post-login redirect. This prevents open redirect attacks
     since only same-domain paths are allowed. */
  o_options.auth = {
    authenticationCallbackUrl: window.location.origin + __mtgRedirect
  };
}
</script>
<script src="https://cdn.outseta.com/outseta.min.js" data-options="o_options"></script>

   Relational List Classes (compact cards on detail pages):

.product-list-wrapper,
.lender-list-wrapper {

.lender-list,

<!-- ================================================
     FETCH INTERCEPTOR — must run in <head> BEFORE any
     body scripts capture window.fetch. Retries API
     calls that get 401 (expired JWT), re-reading the
     token from localStorage each retry so Outseta's
     background refresh is picked up.
     ================================================ -->
<script>
(function() {
  var API = 'https://mtg-broker-api.rich-e00.workers.dev';
  var _f = window.fetch;
  window.fetch = async function(input, init) {
    var url = typeof input === 'string' ? input : (input && input.url) || '';
    if (url.indexOf(API) !== 0) return _f.call(this, input, init);
    function patch(i) {
      try {
        var t = localStorage.getItem('Outseta.nocode.accessToken');
        if (t && i && i.headers) {
          i = Object.assign({}, i);
          i.headers = Object.assign({}, i.headers);
          i.headers['Authorization'] = 'Bearer ' + t;
        }
      } catch(e) {}
      return i;
    }
    init = patch(init);
    var resp = await _f.call(this, input, init);
    if (resp.status === 401) {
      for (var r = 0; r < 5; r++) {
        await new Promise(function(ok) { setTimeout(ok, 1000 * (r + 1)); });
        init = patch(init);
        resp = await _f.call(this, input, init);
        if (resp.status !== 401) break;
      }
    }
    return resp;
  };
})();
</script>
